spring:
  datasource:
    master:
      jdbc-url: jdbc:postgresql://${DB_MASTER_HOST:localhost}:${DB_MASTER_PORT:15432}/${DB_NAME:groom}
      username: ${DB_USERNAME:application}
      password: ${DB_PASSWORD:application}
      hikari:
        maximum-pool-size: 10
        minimum-idle: 5
    replica:
      jdbc-url: jdbc:postgresql://${DB_REPLICA_HOST:localhost}:${DB_REPLICA_PORT:15433}/${DB_NAME:groom}
      username: ${DB_USERNAME:application}
      password: ${DB_PASSWORD:application}
      hikari:
        maximum-pool-size: 10
        minimum-idle: 5

# Platform Core DataSource 라우팅 설정
platform:
  datasource:
    replica-enabled: true
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        format_sql: false  # SQL 포맷팅 비활성화 (성능 최적화)
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false  # SQL 출력 비활성화 (성능 최적화)

# ====================================
# prod 환경 로그 레벨 (프로덕션 환경)
# ====================================
logging:
  level:
    # ROOT 레벨 - WARN (최소한의 로그)
    root: WARN

    # 프로젝트 패키지 - INFO 레벨 (비즈니스 로직 추적)
    com.groom.order: INFO

    # Spring Framework - WARN (필수 로그만)
    org.springframework: WARN
    org.springframework.web: WARN

    # Hibernate/JPA - SQL 로그 완전 비활성화 (성능 최적화)
    org.hibernate: WARN
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
    org.hibernate.type.descriptor.sql: OFF

  file:
    path: ./logs

# Feign Client 설정 (프로덕션)
feign:
  clients:
    product-service:
      url: ${PRODUCT_SERVICE_URL:http://product-service:8083}
      connect-timeout: 3000
      read-timeout: 3000
      logger-level: basic
    store-service:
      url: ${STORE_SERVICE_URL:http://store-service:8084}
      connect-timeout: 3000
      read-timeout: 3000
      logger-level: basic
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 3000
        loggerLevel: basic

# Kafka Producer 설정 (프로덕션)
kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  producer:
    acks: all
    retries: 3
    batch-size: 16384
    linger-ms: 10
    buffer-memory: 33554432
    max-in-flight-requests-per-connection: 5
    enable-idempotence: true
    compression-type: snappy
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
  schema-registry:
    url: ${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}
  topics:
    store-info-updated: store.info.updated
    store-deleted: store.deleted
